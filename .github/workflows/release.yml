name: release

# Standalone publish workflow. Fires on a published GitHub Release (cut locally by
# _workspace/release.ps1). No compile step: CI has no game DLLs. It downloads the release
# zip and mirrors it to Thunderstore and Nexus. This boilerplate is identical across all 9
# mod repos except the mod name; keep them in sync by hand when it changes.
#
# TODO: SolarExpanseExpanded's plugin DLL deploy is temp-disabled and the mod currently
# ships YAML data (Teddit ResearchTreeExpansion), not a plugin DLL. Decide the release
# artifact pattern (YAML payload vs. DLL) before releasing; release.ps1 and thunderstore.toml
# both assume a single-DLL BepInEx/plugins/<Mod>/ layout right now, and the download/unzip
# steps below inherit that assumption.

on:
  release:
    types: [published]

jobs:
  thunderstore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Resolve version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download release zip
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "SolarExpanseExpanded-*.zip" \
            --dir artifacts
      - name: Stage from release zip
        shell: bash
        run: unzip -o "artifacts/SolarExpanseExpanded-${{ steps.ver.outputs.version }}.zip" -d staging
      - name: Install tcli
        run: dotnet tool install --global tcli --version 0.2.4
      - name: Build Thunderstore package
        run: tcli build --package-version "${{ steps.ver.outputs.version }}"
      - name: Publish to Thunderstore
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.TCLI_AUTH_TOKEN }}
        run: tcli publish --package-version "${{ steps.ver.outputs.version }}"

  nexus:
    runs-on: ubuntu-latest
    if: ${{ vars.NEXUS_FILE_ID != '' }}
    steps:
      - name: Resolve version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download release zip
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "SolarExpanseExpanded-*.zip" \
            --dir artifacts
      - name: Publish to Nexus Mods
        uses: Nexus-Mods/upload-action@19da5c91527877cd0bfedc6e6239c911035846a0 # v1.0.0-beta.9
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_id: ${{ vars.NEXUS_FILE_ID }}
          filename: artifacts/SolarExpanseExpanded-${{ steps.ver.outputs.version }}.zip
          version: ${{ steps.ver.outputs.version }}
          # TODO(verify): optional inputs against action.yml @ beta.9 — display_name,
          # description (changelog text), archive_existing_version, allow_mod_manager_download,
          # primary_mod_manager_download, update_mod_version.
